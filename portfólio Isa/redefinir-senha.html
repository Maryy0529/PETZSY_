<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha | Petszy</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<a href="login.html" class="voltar">
←
</a>

<main class="container">
    
<form id="form-redefinir">

<h1>Recuperar senha</h1>

<div class="input-box">

<input
type="email"
id="emailRecuperacao"
placeholder="Digite seu email"
required>

</div>

<div class="input-box">

<input
type="password"
id="novaSenha"
placeholder="Nova senha"
required>

</div>

<button
type="submit"
class="btn-login">

Salvar nova senha

</button>

</form>

</main>

<script src="script.js"></script>

</body>

</html>
